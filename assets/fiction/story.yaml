title: 迟到的双向奔赴
description: 林远亭暗恋陆知微十年。一个雨天，她在闺蜜的消息里看到“林远亭喝醉以后亲口承认了一直喜欢你”，拉着行李箱去他常去的咖啡店——推开门的瞬间，两个人隐藏了十年的秘密开始松动。从便利店到书房，从海边到酒吧，一个人一寸一寸地靠近另一个人。直到她问出“你喜不喜欢我”，他回答“喜欢，很喜欢，喜欢了十年”——才发现原来她也在等。
characters:
- name: 林远亭
  description: 软件创业者。十年间从一个活泼开朗的少年变成沉默寡言的人，他说“我也不知道该怎么和别人建立联系了”。失眠严重的夜里翻看存了十年的她的照片。他说他原来挺爱哭的，现在哭不出来了，什么都堵着。但说到她的时候，眼眶是红的。
- name: 陆知微
  description: 和他一样深情，更勇敢。知道他住哪个小区，所以住在附近。看到他朋友圈说“我压力好大，我好想谈恋爱”，冒着雨去便利店找他。她说“我更心疼在他们的年纪在风暴中孤独无助的你。如果我当时走过去该多好”。也是她问出了那句“你喜不喜欢我”。
plots:
- id: '1_1'
  title: 咖啡厅重逢
  description: 春天的下午，小雨。林远亭在咖啡厅翻看存了十年的她的照片，在日记里写“哪有人暗恋一个人，十年了才告诉其他人有这么回事的”。同一时刻，陆知微收到闺蜜的消息——“我老公说，林远亭喝醉以后亲口承认了一直喜欢你。他这些年一直单着，你快去找他吧。”她的耳机里放着周杰伦“雨纷纷，旧故里草木深。我听闻，你仍守着孤城”。她拉着行李箱跟着导航来到他常去的咖啡店。推开门的瞬间，他转过头，愣住了。他掏出刚在超市买的毛巾，不知不觉伸出去擦了擦她湿漉漉的头发。回过神来，赶紧把毛巾递给她。她接过毛巾，手指不经意间碰到他修长的手指，心弦被狠狠拨动了一下。他要了一杯焦糖玛奇朵，帮她拉行李到桌旁。她端着咖啡杯轻轻抿了一口——“优雅地像一副画一样”，他想。
  tensions:
  - 心理上彼此熟知十年，社交上却是“知名陌生校友”。毛巾是身体的越界——不由自主地靠近，回过神来又缩回，因为“我不应该认识她”
  - 她是有意来找他的——收到消息后直奔咖啡店，却得装作偶遇避雨。他不知道她是有意来的
  - 直接从缩回毛巾切换到主动点单缺少过渡——他刚缩回手（"我不该认识她"），下一句就直接帮她点了焦糖玛奇朵。中间缺一个心理或动作的转折信号
- id: '1_2'
  title: 深夜失眠
  description: 凌晨四点，他失眠翻看她的照片。当面看到还是和照片里不一样。雨天的她有点狼狈，鬼使神差递毛巾时回过神来又害怕越界。她的行李箱是粉色的——似乎还是当年那个小女生。眼睛还是亮晶晶的，让人看到就忍不住想陷进去。同一夜，她梦到他，醒来反复看昨晚他最后一句“祝你好梦”——“你知道吗，我最大的好梦就是你来了。”她想起他十年前高调的样子，现在变得沉默。“更喜欢了”。只是他看起来很不开心。“我能让他开心一些吗？”
  tensions:
  - 同一个夜晚，两个人各自失眠想念——但他们只是“重逢过一次的陌生人”，不能发消息。她反复看“祝你好梦”，心里想“我最大的好梦就是你来了”但不会发出去
  - 她心疼他看起来很不开心，但连询问的资格都没有——她只是他在咖啡厅避雨时偶遇的“陌生人”
- id: '2_1'
  title: 展会再遇
  description: 技术展会上，陆知微被王助理接待。王助理提起林远亭——“他的传说传的一个比一个离谱。”她心里吃味：十年了，他倒是越来越招女孩子喜欢了，但自己好像又没有什么身份吃味——一个暗恋十年的陌生人？王助理看出来了，悄悄给老公发消息“有大瓜！陆总似乎对林总有意思！他们两个是双箭头！”林远亭到了，听到王助理的话里提到了陆知微，脸红着跟了进去。好友张卫海特意把他们的座位安排在一起——“我们把陆知微给请来了，我看你来不来。”那次他喝了一瓶半啤酒说漏了十年的心事，被嘲笑了一晚上。他跟着王助理进入会场，看到了坐在第一排的她——白西装，单马尾，英气又干练。他的心开始剧烈地打鼓。
  tensions:
  - 她吃味是真实的，但“没有身份”——一个陌生人怎么吃醋？王助理这个外人反而比她更自由地说破“双箭头”
  - 好友用她的名字把他请来，但没人告诉她。周围人在撮合，当事人却只能靠旁敲侧击——“社交陌生人”的错位
- id: '2_3'
  title: 傍晚小龙虾
  description: 一起剥小龙虾。她羡慕他的果断，说起被投团队的纠纷——想按条款退出但狠不下心。他说“我前一阵子也这样在折磨自己。团队大了，靠我当大家长的模式维系不下去了。得一次一次提醒自己，必须要狠下心来，按着所有人按规则走。”她看着他心疼的眼神，第一次亲眼看到他的关心。结账时老板说起打工往事，他们认真听着——他说“我很喜欢和店主们聊天，比精英圈子里那群道貌岸然的精英有意思地多”，她说“很希望他们被看到”。他说“和你在一起很容易回到不土不洋的原生态，很放松”——躲开她的视线看向远方。她的心里被狠狠戳了一下。
  tensions:
  - 心理熟人：她可以对他谈工作中的脆弱（被投团队纠纷），因为他懂创业者。他分享自己如何“折磨自己”，第一次对她敞开了一部分内心
  - 社交陌生人：说“和你在一起很放松”暴露了“你对我来说不一般”，说完立刻躲开视线——这句话越界了。她心里被戳了一下，却不能回应
- id: '4_1'
  title: 便利店谈心
  description: 深夜，他在便利店发朋友圈“我压力好大！我好想谈恋爱！”，没有一个人问他怎么了——又好笑又心酸。他说“只有 AI 们还可以说一说心里话，其他人都没法说”。她刷到后冒雨赶来，在门口合上潮湿的伞，买了两份关东煮挨着他坐下。他说“我的心里弥漫着一种不开心”，说到压力说到父母——“我经常坐在这里想他们，有时候觉得很有压力，有时候又觉得很愧疚。”她本想说“第一次看你演讲的时候”话到嘴边又停住，伸手捏了捏他的肩。他闭上眼睛感受——“她的手好软好细啊”。窗外雨停了，他问要不要去夜市。
  tensions:
  - 他发朋友圈期待她看到，但不知道她会不会来。她看到后冒雨赶来，却解释为“住附近顺便买关东煮”——“是知道你住那附近，我才在那住的”这句话她心里清楚但不会说
  - 她本想提“第一次看你演讲”——等于承认关注了他十年，话到嘴边又停住。十年的心事压在舌尖下，连提一个名字都不敢
  - 她本想提"第一次看你演讲"→话到嘴边又停住，这个转折缺少外在触发（为什么停住了？是什么让她决定换话题？），容易显得是作者在控制而非人物在判断
- id: '4_2'
  title: 夜市约会
  description: 春天的雨夜过后，他们并肩穿过小吃摊。他在一家麻辣烫摊前拉住她的衣袖——“就是这家。”他侧过头看她的脸，记忆里十年前的身影和眼前重合，一瞬间有些恍惚。她装作不经意地问为什么那天在咖啡厅。他说“其实很多时候对我来说，心事重重才是一种放空。”他不敢说下去——总不能说，那天我在想你，没想到你突然从天而降了。她心里也藏着秘密：她本只是碰碰运气。他拿出手机给表妹发消息——星抖上的小火人已经第75天了。她凑过来看，他装作漫不经心地把手机递过去。她抬起头撞上他的眼神，他慌忙撇开。她突然想得寸进尺：“你也陪我养一个！”于是加了星抖好友。回去的路上，路灯把影子照亮在地上——“所以今天能分享好吃的给你，我很开心。能有人陪我一起吃夜宵，我更开心。”她知道他这些年一直这样。“他一定很孤独吧。如果我早点来就好了。”
  tensions:
  - 她问“为什么在咖啡厅”是在试探他是否为自己在那里。他说“心事重重才是放空”不敢说“那天我在想你”
  - 她说“看到朋友圈”暴露了记得那家店——但仍用“碰碰运气”掩饰。他想问“你是不是特意来找我的”却不敢开口
  - 两人都在离真相最近的地方徘徊：她知道他孤独，他知道她有心事，但谁都不开口
- id: '4_3'
  title: 互相问早
  description: 他被阳光唤醒。照例处理工作消息，在大群小群敲“全局视角”。想找什么人倾诉，打开和她的对话框又犹豫——万一她也觉得是打扰呢。他和 AI
    聊，AI 给了长篇大论的建议，只有最后一句有用：“你愿意为她整理心情，就已经是在靠近她了。”他鼓起勇气发了一个“早起打工”的小狗表情包。她秒回了一个“好困”的小熊。“嘿嘿，这是你第一次和我问早哇！我很开心！下次如果我醒得早点，我也来给你问早！”他的心里暖开了一大片。他拍了一张天空给她，她也回了一张她的天空。
  tensions:
  - 他犹豫要不要发消息——这是暗恋者最深的恐惧：“我的关心会不会被当成骚扰”。AI给了他勇气
  - 她秒回“第一次和我问早哇”暴露了她一直在等他的消息。但关系仍然隔着屏幕——“社交陌生人”还没走到“天天联系”的默契
- id: '6_2'
  title: 海边散步
  description: 海边的自白。她指着一个长椅问他大四那年是不是坐在那里写东西——他诧异她怎么知道。她记得那晚快12点，她在他身后站了一小会。他说“前一段时间很困惑，他们越来越不需要我了，我不知道自己该怎么自处了。这些年我越来越习惯一个人，我不知道该怎么和别人建立联系了。大家都有自己的世界，只有我身处一个人的世界里没有人可以说话。我很难过，当我想找谁说说我的难过的时候，我发现我不知道找谁说，也说不出来，就更难过了。”她拉他靠近海边，“喊一嗓子吧”。他突然拽起她的手腕向前跑去。灯光下的那道影子，是贯穿了一整个青春里的身影。三十岁的他们，好像一对二十岁的年轻人。回到栈道上，她说当年觉得他特别难接近，他说记得她的毕业演出——“你的古典舞又飘逸又灵动的，像从天而降的仙女。”
  tensions:
  - 十年来最近的一次接触：大四那晚她站在他身后，没有走过去。现在她终于说出来了——“心理熟人”的证据被摊开，但他当时毫无察觉
  - 他第一次完整坦白自己的孤独——“大家都有自己的世界，只有我身处一个人的世界”。这不是对陌生人说的，但他还没有说“因为是你我才愿意说”
  - 拽手腕奔跑是身体的又一次越界，但这一次没有缩回——“陌生人”的防线在瓦解
  - 他说完孤独自白→她拉他喊一嗓子→他突然拽她跑——三个情绪状态（沉重→释放→奔跑）在几行内切换，每个转换都需要一个物理锚点
- id: '7_2'
  title: 公园拥抱
  description: 饭后散步路过他常去的公园。“我一个人来过很多次。但在马路上走，这是第一次。我就是这样，在熟悉和陌生之间走，慢慢把自己找回来。”她问这么多年有人心疼过你吗。他说有啊我自己。她眼泪掉下来，抱住他。“你一个人，太苦了。”他身体僵直，肩头在她无声的哭泣中微微起伏。他说他原来挺爱哭的，现在哭不出来了，什么都堵着。她把头埋得更深。她反复说“以后我陪你”。
  tensions:
  - “有啊我自己”是他最后的防御。十年了，照顾他情绪的只有他自己。她的拥抱打破了这层防御
  - 他身体僵直的那一瞬是“陌生人”最后的壁垒在瓦解——被心疼是陌生的体验
  - 她说“以后我陪你”但不是“我喜欢你”——“陌生人”的身份还没有正式解除，但承诺已经给出
- id: '8_2'
  title: 酒吧表白
  description: 他带她去常去的酒吧，指着靠里的桌子——“这个桌子我一个人来的时候常坐。”喝了酒，她回忆大四聚餐，说那天只记得他，白色衬衣黑色裤子。他顿了顿，突然想起来。“当然，一直记着。”“如果我们互相都记着对方十年，那么我们错过的十年要算什么呢。”酒吧音乐切换到张玉华《原谅》——“原谅被你带走的永远”。良久，他回答“我们都原谅自己。原谅旧时光里彷徨蹉跎的十年。”她鼓起勇气：“你喜不喜欢我？”“喜欢，很喜欢，喜欢了十年。喜欢地想要发疯。”“那你愿不愿意和我在一起。”“愿意。一直都愿意。”“你不许离开我。”“我离不开你，也不愿意离开你。”
  tensions:
  - “十年”第一次被两个人同时摊开在桌面上。她问出“错过的十年算什么”——这是全剧最痛的问题
  - 从沉默到"原谅自己"缺少过渡——他听完她的遗憾后直接给出哲思回应，缺少一个承接的动作或念头。需要补一个过渡（看酒杯、想起什么）让回应显得是经过消化的，而非凭空插入
  - 他答“原谅自己”——不是忘记，是接受。“社交陌生人”在这一刻被一句“你喜不喜欢我”正式解除
  - 但“原谅”本身就是一种张力：接受不等于不痛。十年的沉默是一个伤口，“原谅”是开始愈合，但疼痛还在
- id: '9_1'
  title: 家里吃火锅
  description: 她到他家，桌上已摆好火锅。他从柜子里掏出一双崭新的 Hello Kitty 女式拖鞋——“试试看。这是我这两天刚买的。”大了一码，刚好松快。他切菜装盘：冬瓜、毛肚、牛羊肉卷、豆腐、豆芽、青菜、鸡腿。她问有没有西红柿，他从冰箱上层掏出一个切片。她做调料碟：醋、生抽、蚝油、辣椒油、香油。
  tensions:
  - 前一场酒吧表白是情感高潮，这里骤然安静。最大的张力是日常本身的平淡——关系从表白回归生活
  - 拖鞋大了一码——他特意买的但不完全合脚，恰到好处地透露了“还不够了解但很用心”：从心理熟人到真正的恋人，日常是最终的磨合
- id: '10_1'
  title: 书房陪伴
  description: 她在书房帮他整理书桌，碰掉一沓活页纸。大部分是软件设计稿，有一张密密麻麻的字——是他写给自己的信。“19岁的我，你好啊，我是29岁的我。转眼间已经十年了。这条路我已经独自走了十年，于我却不觉得孤独。可我还是最想要她的陪伴。求求上天看看我这份渴望吧。”她看着信，泪光点点。他回来，她扑进怀里捶他——“坏蛋！坏蛋！坏蛋！”他拿过活页纸看了一眼，失笑：“原来它在这里。本来想作为生日礼物送给你的，现在提前送了。”他搬开椅子把她放在腿上旁听产品会议，“小爱同学，播放都智文的《夜与昼》”。她歪头靠着他的肩，看他在共享文档里噼里啪啦敲问题。“黑心资本家！”她吐槽，他拍她脑袋。她突然感伤——“我更心疼在他们的年纪在风暴中孤独无助的你。如果我当时走过去该多好。”他眼眶湿润，把她揽入怀中。音箱里都智文唱着：“原来我曾有过裂口，等你照亮我的宇宙。”
  tensions:
  - 她发现了他最隐秘的证据——“求求上天看看我这份渴望吧”。这不是写给她的，是他写给自己的。十年前的他向现在的他喊话——她偷听到了这十年的孤独
  - “如果我当时走过去该多好”是她对“十年陌生人”的最后一次感叹。从此，“陌生人”被彻底埋葬——她不需要再走过去，因为她已经在这里了
  - 7个情绪转折在40行内完成（发现信→抹泪→捶他→旁听会议→吐槽黑心资本家→感伤→拥抱），每个转折的过渡空间极窄，容易让读者来不及跟随情绪
- id: '10_2'
  title: 客厅看剧
  description: 他按下公众号的“发表”按钮，她拉他陪看剧。她舒服地在他怀里蹭了蹭。他还在想文章数据，她佯装恼火：“我都靠你怀里了耶，难道我还没有工作吸引你吗！”他安静下来。她说“你说吧，我听着。”他说“我在尝试把作为创造者的自己和作为创始人的工作身份分开，找不到那条弹性的边界。”她疑惑：“弹性的边界为什么要有应该在的位置？”他被点醒。她问“那你什么时候把他们都忘掉，只当我一个人的苹果？”他眉头舒展开，拍了拍她的脑袋——“谢谢你哦(´-ω-`)”。他们靠着看《神探狄仁杰
    III》，她学元芳说话逗他。她亮晶晶的眼睛照进他心里，他左手托住她的脑袋吻了上去——电视里元芳喊“快保护大人”，两个人谁也没听到。她轻轻锤他，他嘿嘿地笑“好不容易把你拐到手，怎么能不坏呢”。她问如果十年前就在一起会怎么样。他说“那个时候的我还太年轻气盛，或许做不到好好维系一段感情。所以或许现在是最好的时候。”她陷入回忆——“十年前啊，我经常在各种场合里仰望你。那个时候到处都是你的身影，想不注意都难。”他说：“你从来都不是一个人。”她说：“我知道的。我也心疼你。”
  tensions:
  - 她问“十年前在一起会怎样”——对错过的十年还有不舍。他答“太年轻做不到”——如果早了可能反而失去，现在才是对的时间
  - “你从来都不是一个人”是他对她十年仰望的回望——双向终于被两个人共同确认。但她还需要追问“你会一直陪着我吗”，说明安全感还没有完全建立
- id: '10_3'
  title: 阳台看星星
  description: 她窝在他怀里看星星。她问“你会一直陪着我吗？”他想外公了——“不知道他是天上的哪颗星星呢。”他说心里有三个方向的三堵墙，内心世界、外部世界、虚构世界，好像是同一堵墙的分身。他说他的远见不只五到十年——他希望探索如何让集体智慧在千年以后还能在时间里熠熠生光。爸妈吐槽他开的是皮包公司但从没反对过。“他们只是心疼我太辛苦。”他眼泪悄悄流下来。她凝望路灯，“这份吐槽着支持的爱，是独属于人类而不属于AI的不合理，是可以穿越千年的闪耀星光。”她握住他的手，“陪我回去看看他们好不好？我想给他们准备点广式腊肠带过去。”音响传来《Falling
    You》——“难道让时间倒流，世界尽头，要陪在你左右。”
  tensions:
  - 他第一次对她敞开最深的世界——外公、父母、千年愿景。十年暗恋时这些只能自己扛，现在有一个人可以接住
  - 她问“你会一直陪着我吗”——安全感还未落地。他聊三堵墙、皮包公司、父母，没有直接回答“会”
  - 但她用“陪回去看他们”回应了——不是用承诺回答承诺，而是用行动：“我已经准备好走进你全部的生活了”
